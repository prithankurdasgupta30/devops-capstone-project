[nosetests]
verbosity=2
with-coverage=1
cover-package=service
cover-erase=1
cover-inclusive=1
cover-min-percentage=95
with-spec=1
spec-color=1
nologcapture=1

[coverage:run]
branch = True
source = service

[coverage:report]
show_missing = True
skip_covered = True
fail_under = 95

[flake8]
max-line-length = 88
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .tox,
    dist,
    build
ignore =
    W503,
    E203

[pylint]
max-line-length=88
disable=
    C0103,
    C0114,
    C0115,
    C0116

[tool:pytest]
testpaths = tests
python_files = test_*.py
